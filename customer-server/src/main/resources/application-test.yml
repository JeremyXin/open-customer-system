# Test environment configuration
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3307}/customer_service_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_ROOT_PASSWORD:root123}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: false

# SQL logging disabled in test
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT config - short-lived tokens for faster test cycles
app:
  jwt:
    secret: test-secret-key-not-for-production
    expiration: 600000
    refresh-expiration: 1800000

logging:
  level:
    com.opencustomer.server: INFO
    org.springframework.web: WARN
